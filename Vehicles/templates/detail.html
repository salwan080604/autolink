{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Details</title>

    <link rel="stylesheet" href="{% static 'car_details.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

{% include 'nav.html' %}

<div class="content-wrapper">
    <div class="container">

        <!-- LEFT -->
        <div class="left-column">

            <!-- IMAGE CAROUSEL -->
            <div class="car-image" id="image-container">
                <button class="nav-button prev-button" id="prev-btn">&#60;</button>
                <button class="nav-button next-button" id="next-btn">&#62;</button>
            </div>

            <!-- USER INFO -->
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="user-details">
                    <h4 id="seller-name"></h4>
                    <p id="vehicle-desc"></p>
                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="car-info">

            <h2 id="vehicle-title"></h2>

            {% if request.user.userprofile.user_type == 'buyer' %}
                <button class="contact-button" id="contact-btn">Contact Seller</button>
            {% else %}
                <button class="contact-button" style="background-color:#504f55f7;" disabled>
                    Contact Seller
                </button>
            {% endif %}

            <div class="info-item"><span class="info-label">Year:</span><span id="year"></span></div>
            <div class="info-item"><span class="info-label">Fuel:</span><span id="fuel"></span></div>
            <div class="info-item"><span class="info-label">Transmission:</span><span id="transmission"></span></div>
            <div class="info-item"><span class="info-label">Mileage:</span><span id="mileage"></span></div>
            <div class="info-item"><span class="info-label">For:</span><span id="type"></span></div>

            <div class="price" id="vehicle-price"></div>

            <div class="map-section">
                <h3>Location</h3>
                <div id="vehicle-map" class="map-container"></div>
            </div>

        </div>
    </div>
</div>

<footer>
    {% include "footer.html" %}
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let vehicle = null;
let slideIndex = 0;
let images = [];

// GET ID
const vehicleId = window.location.pathname.split("/").filter(Boolean).pop();

// FORMAT PRICE
function formatPrice(value){
    if(value >= 1000000) return (value/1000000).toFixed(2)+'M';
    if(value >= 1000) return (value/1000).toFixed(2)+'k';
    return value;
}

// LOAD VEHICLE
function loadVehicle(){

    $.ajax({
        url: `/api/vehicles/${vehicleId}/`,
        method: "GET",
        success: function(data){

            vehicle = data;

            $("#vehicle-title").text(`${data.make} ${data.model}`);
            $("#seller-name").text(data.uploader);
            $("#vehicle-desc").text(data.desc);

            $("#year").text(data.year);
            $("#fuel").text(data.fuel_type);
            $("#transmission").text(data.transmission);
            $("#mileage").text(data.mileage + " km");

            $("#type").text(data.is_rental ? "Renting" : "Selling");

            let color = data.is_rental ? "#2c3e50" : "red";
            $("#vehicle-price")
                .css("color", color)
                .text("Rs " + formatPrice(data.price));

            // CONTACT BUTTON FIX
            if(!data.contact){
                $("#contact-btn").prop("disabled", true);
            }

            // IMAGES FIX (use append)
            let container = $("#image-container");

            data.images.forEach((img, i)=>{
                let image = $(`<img src="${img.image}" class="${i===0?'active':''}">`);
                container.append(image);
                images.push(image);
            });

            initMap(data.gps_coor);
        }
    });
}

// CAROUSEL
function showImage(n){
    if(images.length === 0) return;

    slideIndex = (n + images.length) % images.length;

    images.forEach(img => img.removeClass("active"));
    images[slideIndex].addClass("active");
}

// MAP
function initMap(gps){

    let coords = gps ? gps.split(',').map(Number) : [-20.1609,57.5012];

    let map = L.map('vehicle-map').setView(coords, 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
        .addTo(map);

    L.marker(coords)
        .addTo(map)
        .bindPopup(vehicle.make + " " + vehicle.model)
        .openPopup();
}

// READY
$(document).ready(function(){

    loadVehicle();

    $("#prev-btn").click(()=> showImage(slideIndex - 1));
    $("#next-btn").click(()=> showImage(slideIndex + 1));

    $(document).on("click", "#contact-btn", function () {

        if (!vehicle || !vehicle.contact) {
            alert("Phone number not available");
            return;
        }

        let phone = vehicle.contact.replace(/\D/g, '');
        let msg = encodeURIComponent(
            `Hello, I'm interested in your ${vehicle.make} ${vehicle.model}.`
        );

        window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
    });

});

</script>

</body>
</html>
